{% extends "app/base.html" %}
{% block title %}Check Your Email - MitsuList{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm text-center py-5">
            <div class="card-body">
                <i class="fas fa-envelope-open-text fa-4x text-primary mb-4"></i>
                <h2 class="card-title mb-3">Check Your Email</h2>
                <p class="card-text text-muted mb-4">
                    We've sent an activation link to <strong>{{ email }}</strong>.<br>
                    Please check your inbox (and your spam folder) to activate your account.
                </p>
                <hr>
                <p class="small text-muted mb-0">
                    Already verified? <a href="{% url 'login' %}">Log in here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
